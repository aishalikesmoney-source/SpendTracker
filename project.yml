name: SpendTrack
options:
  bundleIdPrefix: com.spendtrack
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  LinkKit:
    url: https://github.com/plaid/plaid-link-ios
    from: "5.6.1"

targets:
  SpendTrack:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SpendTrack
        excludes:
          - Resources/Assets.xcassets
    resources:
      - path: SpendTrack/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spendtrack.app
        INFOPLIST_FILE: SpendTrack/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SpendTrack/SpendTrack.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: LinkKit
    schemes:
      SpendTrack:
        build:
          targets:
            SpendTrack: all
        run:
          config: Debug
        test:
          config: Debug
        archive:
          config: Release
